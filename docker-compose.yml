services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fpuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fppassword}
      POSTGRES_DB: ${POSTGRES_DB:-fingerprints_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-fpuser} -d ${POSTGRES_DB:-fingerprints_db}
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_APP: run.py
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-fpuser}:${POSTGRES_PASSWORD:-fppassword}@db:5432/${POSTGRES_DB:-fingerprints_db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      ALLOW_RAW_EXPORT: ${ALLOW_RAW_EXPORT:-false}
    expose:
      - "5000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  pgdata: